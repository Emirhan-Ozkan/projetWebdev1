<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau Kanban</title>
  <script src="js/main.js" type="module" defer></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>Kanban En Ligne</h1>
  </header>

  <main class="board" id="board">

    <!-- Colonne À faire -->
    <section class="column" id="col-todo" data-col="todo">
      <div class="column-header">
        <span class="column-title">À faire</span>
        <span class="column-count" id="count-todo">0</span>
      </div>
      <div class="cards" id="cards-todo">
        <!-- Les tâches sont ici -->
      </div>
      <div class="drop-zone" id="drop-todo"></div>
      <button class="add-trigger" id="addTodoBtn">+ Ajouter une carte</button>
      <div class="add-form" id="form-todo">
        <textarea class="add-input" id="input-todo" rows="2" placeholder="Titre de la tâche..."></textarea>
        <div class="form-actions">
          <button class="btn-add" onclick="addCard('todo')">Ajouter</button>
          <button class="btn-cancel" onclick="hideForm('todo')">Annuler</button>
        </div>
      </div>
    </section>

    <!-- Colonne En cours -->
    <section class="column" id="col-doing" data-col="doing">
      <div class="column-header">
        <span class="column-title">En cours</span>
        <span class="column-count" id="count-doing">0</span>
      </div>
      <div class="cards" id="cards-doing">
        <!-- Les tâches sont ici -->
      </div>
      <div class="drop-zone" id="drop-doing"></div>
      <button class="add-trigger" id="addDoingBtn">+ Ajouter une carte</button>
      <div class="add-form" id="form-doing">
        <textarea class="add-input" id="input-doing" rows="2" placeholder="Titre de la tâche..."></textarea>
        <div class="form-actions">
          <button class="btn-add" onclick="addCard('doing')">Ajouter</button>
          <button class="btn-cancel" onclick="hideForm('doing')">Annuler</button>
        </div>
      </div>
    </section>

    <!-- Colonne Terminé -->
    <section class="column" id="col-done" data-col="done">
      <div class="column-header">
        <span class="column-title">Terminé</span>
        <span class="column-count" id="count-done">0</span>
      </div>
      <div class="cards" id="cards-done">
        <!-- Les tâches sont ici -->
      </div>
      <div class="drop-zone" id="drop-done"></div>
      <button class="add-trigger" id="addDoneBtn">+ Ajouter une carte</button>
      <div class="add-form" id="form-done">
        <textarea class="add-input" id="input-done" rows="2" placeholder="Titre de la tâche..."></textarea>
        <div class="form-actions">
          <button class="btn-add" onclick="addCard('done')">Ajouter</button>
          <button class="btn-cancel" onclick="hideForm('done')">Annuler</button>
        </div>
      </div>
    </section>
    

    <dialog id="task-dialog">
        <h2 id="task-dialog__title">Ajouter/Modifier une tâche : </h2>
        <form id="task-dialog__form">
            <div>
                <label for="task-dialog__task-title">Titre :</label>
                <input type="text" id="task-dialog__task-title" required>
            </div>
            <div>
                <label for="task-dialog__task-description">Description :</label>
                <textarea id="task-dialog__task-description" required></textarea>
            </div>
            <div>
                <button type="submit" id="task-dialog__save-btn">Sauvegarder</button>
                <button type="button" id="task-dialog__cancel-btn">Annuler</button>
            </div>
        </form>
    </dialog>

  </main>
  <p id="credits">Projet par : Emirhan OZKAN et Léo JOHANNES </p>
</body>
</html>
